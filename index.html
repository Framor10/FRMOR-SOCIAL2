<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FRAMOR - Connect Differently</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #05050A;
            --bg-surface: #0C0C14;
            --bg-card: rgba(18, 18, 28, 0.85);
            --glass-edge: rgba(255, 255, 255, 0.03);
            --glass-edge-light: rgba(255, 255, 255, 0.08);
            --primary: #FF2D6E;
            --primary-glow: #FF2D6E;
            --secondary: #FF8A2B;
            --accent: #7C3AED;
            --text-main: #FFFFFF;
            --text-muted: #A1A1B0;
            --text-dim: #6E6E80;
            --success: #10B981;
            --error: #EF4444;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.4);
            --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0A0A12, #020206);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            color: var(--text-main);
            line-height: 1.5;
            font-weight: 400;
        }

        /* premium glassmorphism + smooth scroll */
        #loginScreen, #mainApp {
            transition: opacity 0.3s ease;
        }

        /* ========= LOGIN SCREEN — LUXE ========= */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            position: relative;
            background: radial-gradient(ellipse at 30% 40%, rgba(255, 45, 110, 0.12), transparent 70%);
        }

        #loginScreen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.1"><path fill="none" stroke="%23FF2D6E" stroke-width="0.6" d="M60 100 L140 100 M100 60 L100 140 M80 80 L120 120 M80 120 L120 80"/><circle cx="100" cy="100" r="40" stroke="%23FF8A2B" stroke-width="0.5" fill="none"/></svg>') repeat;
            opacity: 0.2;
            pointer-events: none;
        }

        #loginScreen h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF2D6E, #FF8A2B, #A855F7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        #loginScreen p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        #loginForm {
            width: 100%;
            max-width: 340px;
            margin-top: 0.5rem;
            position: relative;
            z-index: 2;
        }

        #loginForm input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 40px;
            border: 1.5px solid var(--glass-edge);
            background: rgba(12, 12, 20, 0.7);
            backdrop-filter: blur(8px);
            color: white;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }

        #loginForm input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 45, 110, 0.08);
            box-shadow: 0 0 0 3px rgba(255, 45, 110, 0.2);
        }

        #loginForm input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #loginForm button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            background: linear-gradient(105deg, #FF2D6E, #FF8A2B);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 45, 110, 0.2);
        }

        #loginForm button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 45, 110, 0.35);
            letter-spacing: 0.3px;
        }

        #googleBtn {
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            box-shadow: none !important;
        }

        #googleBtn:hover {
            background: rgba(255, 255, 255, 0.18) !important;
            transform: translateY(-2px);
        }

        /* ========= MAIN APP ========= */
        #mainApp {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 550px;
            min-height: 100vh;
            background: var(--bg-surface);
            backdrop-filter: blur(0px);
            border-left: 1px solid var(--glass-edge);
            border-right: 1px solid var(--glass-edge);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* header gloss */
        .framor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: rgba(8, 8, 14, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-edge);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(125deg, #FF2D6E, #FF8A2B);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        /* Navbar — modern pill design */
        .nav-bar {
            display: flex;
            background: rgba(12, 12, 20, 0.7);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            gap: 8px;
            border-bottom: 1px solid var(--glass-edge);
            position: sticky;
            top: 72px;
            z-index: 15;
        }

        .nav-item {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 6px;
            border-radius: 40px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .nav-item i {
            font-size: 1rem;
        }

        .nav-item:hover {
            color: white;
            background: rgba(255, 45, 110, 0.15);
        }

        .nav-item.active {
            background: linear-gradient(105deg, #FF2D6E, #FF8A2B);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 45, 110, 0.3);
        }

        .panel {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            padding-bottom: 90px;
            scrollbar-width: thin;
        }

        .panel.active {
            display: block;
            animation: fadeSlide 0.28s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards — elegant frosted */
        .post-card, .message-bubble, .friend-card, .profile-card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-edge);
            transition: var(--transition);
        }

        .post-card:hover, .friend-card:hover {
            border-color: rgba(255, 45, 110, 0.4);
            transform: translateY(-3px);
            background: rgba(22, 22, 34, 0.9);
            box-shadow: var(--shadow-sm);
        }

        /* REELS STYLES - Instagram-like vertical video feed */
        .reels-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        .reel-item {
            background: #000000;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            margin-bottom: 16px;
            border: 1px solid var(--glass-edge);
            transition: var(--transition);
        }

        .reel-item:hover {
            transform: scale(1.02);
            border-color: rgba(255, 45, 110, 0.5);
            box-shadow: var(--shadow-md);
        }

        .reel-video {
            width: 100%;
            max-height: 70vh;
            object-fit: cover;
            background: #000;
            display: block;
        }

        .reel-info {
            padding: 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            position: relative;
            z-index: 2;
        }

        .reel-user {
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .reel-caption {
            color: white;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        .reel-actions {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .reel-like-btn, .reel-comment-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 30px;
            transition: 0.2s;
        }

        .reel-like-btn:hover, .reel-comment-btn:hover {
            background: rgba(255, 45, 110, 0.2);
        }

        .reel-liked {
            color: var(--primary);
        }

        .no-reels {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* create post area */
        .create-post {
            background: rgba(18, 18, 28, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid var(--glass-edge);
        }

        .create-post textarea, .create-post input {
            width: 100%;
            background: rgba(8, 8, 12, 0.8);
            border: 1px solid var(--border-subtle);
            padding: 14px 16px;
            border-radius: 24px;
            color: white;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .create-post textarea:focus, .create-post input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 45, 110, 0.05);
            box-shadow: 0 0 0 2px rgba(255, 45, 110, 0.2);
        }

        button {
            background: linear-gradient(105deg, #FF2D6E, #FF8A2B);
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.03);
            box-shadow: 0 8px 20px rgba(255, 45, 110, 0.3);
        }

        .post-stats {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .like-btn, .comment-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 30px;
        }

        .like-btn:hover, .comment-btn:hover {
            background: rgba(255, 45, 110, 0.15);
            color: var(--primary);
        }

        .liked {
            color: var(--primary) !important;
        }

        .comment-input {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .comment-input input {
            flex: 1;
            background: rgba(10, 10, 16, 0.8);
            border-radius: 50px;
            padding: 10px 16px;
            border: 1px solid var(--border-subtle);
            color: white;
        }

        /* chat */
        .chat-input-container {
            display: flex;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(12, 12, 20, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-edge);
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 24px);
            max-width: 526px;
            border-radius: 32px 32px 0 0;
            z-index: 20;
        }

        .chat-input-container input {
            flex: 1;
            background: #0E0E16;
            border-radius: 60px;
            padding: 12px 18px;
            border: 1px solid var(--border-subtle);
            color: white;
        }

        /* profile stats */
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 20px 0;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF2D6E, #FF8A2B);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .edit-profile-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 500;
        }

        .edit-profile-btn:hover, .logout-btn:hover {
            background: rgba(255, 45, 110, 0.2);
            border-color: var(--primary);
        }

        .friend-actions button {
            border-radius: 30px;
            font-size: 0.75rem;
            padding: 6px 14px;
        }

        .accept-btn {
            background: linear-gradient(105deg, #10B981, #059669);
        }

        .reject-btn {
            background: linear-gradient(105deg, #EF4444, #B91C1C);
        }

        /* search */
        .search-box {
            background: rgba(12, 12, 20, 0.7);
            border: 1px solid var(--glass-edge);
            border-radius: 60px;
            padding: 12px 20px;
            width: 100%;
            color: white;
            margin-bottom: 20px;
        }

        /* message bubbles */
        .message-bubble {
            border-radius: 24px;
            margin-bottom: 12px;
            padding: 12px 18px;
            font-size: 0.9rem;
        }

        .selected-chat {
            border: 1.5px solid var(--primary);
            background: rgba(255, 45, 110, 0.2);
        }

        .chat-friend-item {
            cursor: pointer;
            transition: 0.2s;
        }

        /* scroll */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF2D6E;
            border-radius: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        video, .post-image {
            border-radius: 24px;
            margin-top: 12px;
            max-width: 100%;
        }

        h3 {
            font-size: 1rem;
            margin: 20px 0 12px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: #ddd;
        }

        .profile-info h3 {
            font-size: 1.7rem;
            background: linear-gradient(135deg, white, #FFD0B5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div id="loginScreen">
    <h1>FRAMOR</h1>
    <p>Connect differently ✨</p>
    <div id="loginForm">
        <input type="email" id="email" placeholder="📧 Email">
        <input type="password" id="password" placeholder="🔐 Password">
        <button id="signupBtn">Create Account</button>
        <button id="loginBtn">Sign In</button>
        <button id="googleBtn">🚀 Sign in with Google</button>
    </div>
    <div id="loginMessage"></div>
</div>

<div id="mainApp">
    <div class="framor-header">
        <div class="logo">FRAMOR</div>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Exit</button>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" data-panel="feed"><i class="fas fa-newspaper"></i> Feed</button>
        <button class="nav-item" data-panel="videos"><i class="fas fa-video"></i> Reels</button>
        <button class="nav-item" data-panel="friends"><i class="fas fa-user-friends"></i> Friends</button>
        <button class="nav-item" data-panel="profile"><i class="fas fa-user-astronaut"></i> Profile</button>
        <button class="nav-item" data-panel="chat"><i class="fas fa-comment-dots"></i> Chat</button>
    </div>

    <div id="feedPanel" class="panel active">
        <div class="create-post">
            <textarea id="postText" placeholder="What's on your mind? 🔥" rows="2"></textarea>
            <input type="file" id="postImage" accept="image/*" placeholder="📸 Image">
            <input type="file" id="postVideo" accept="video/*" placeholder="🎥 Video">
            <button id="createPostBtn"><i class="fas fa-feather-alt"></i> Post to FRAMOR</button>
        </div>
        <div id="feedList"></div>
    </div>

    <div id="videosPanel" class="panel">
        <div id="videoList" class="reels-container"></div>
    </div>

    <div id="friendsPanel" class="panel">
        <input type="text" id="searchUsers" class="search-box" placeholder="🔍 Search users to add...">
        <div id="searchResults"></div>
        <h3><i class="fas fa-user-group"></i> My Friends</h3>
        <div id="friendsList"></div>
        <h3><i class="fas fa-envelope-open-text"></i> Friend Requests</h3>
        <div id="friendRequests"></div>
    </div>

    <div id="profilePanel" class="panel">
        <div id="profileView">
            <div class="profile-card" id="profileDisplay"></div>
            <button class="edit-profile-btn" id="editProfileBtn">✏️ Edit Profile</button>
        </div>
        <div id="profileEdit" style="display:none;">
            <div class="profile-card">
                <h3>Edit Profile</h3>
                <input type="text" id="editDisplayName" class="profile-input" placeholder="Display Name">
                <textarea id="editBio" class="profile-input" rows="3" placeholder="Bio"></textarea>
                <input type="text" id="editLocation" class="profile-input" placeholder="Location">
                <input type="text" id="editWebsite" class="profile-input" placeholder="Website">
                <button id="saveProfileBtn">💾 Save Changes</button>
                <button id="cancelEditBtn" class="logout-btn" style="margin-top: 12px;">Cancel</button>
            </div>
        </div>
        <div id="myPostsList"></div>
    </div>

    <div id="chatPanel" class="panel">
        <div id="chatFriendsList"></div>
        <div id="chatMessages" style="max-height: 45vh; overflow-y: auto; margin-top: 16px;"></div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Select a friend to chat..." disabled>
            <button id="sendChatBtn" disabled>Send</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const SUPABASE_URL = "https://pknztsbadizlcnlzppch.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Qvi0piL5vNk-734kukD5GA_WtC6nSvb";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let selectedChatFriend = null;
        let userProfile = null;

        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const loginMessage = document.getElementById('loginMessage');

        function showMessage(element, text, type) {
            if (!element) return;
            element.innerHTML = `<div class="message ${type}" style="background: rgba(0,0,0,0.7); backdrop-filter:blur(8px); border-radius:60px; padding:12px; margin-top:16px;">${text}</div>`;
            setTimeout(() => { if (element.innerHTML.includes(text)) element.innerHTML = ''; }, 2800);
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        // ---------- PROFILE ----------
        async function loadProfile() {
            if (!currentUser) return;
            let { data: profile } = await supabase.from('user_profiles').select('*').eq('id', currentUser.id).single();
            if (!profile) {
                const { data: newProfile } = await supabase.from('user_profiles').insert({ id: currentUser.id, display_name: currentUser.email.split('@')[0] }).select().single();
                profile = newProfile;
            }
            userProfile = profile;
            const { count: postsCount } = await supabase.from('posts').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
            const { data: friendships } = await supabase.from('friends').select('*').or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`).eq('status', 'accepted');
            const friendsCount = friendships?.length || 0;

            document.getElementById('profileDisplay').innerHTML = `
                <div class="profile-info">
                    <h3>${escapeHtml(profile?.display_name || currentUser.email.split('@')[0])}</h3>
                    <p><i class="fas fa-envelope"></i> ${escapeHtml(currentUser.email)}</p>
                    <p><i class="fas fa-quote-left"></i> ${escapeHtml(profile?.bio || 'No bio yet')}</p>
                    <p><i class="fas fa-map-marker-alt"></i> ${escapeHtml(profile?.location || 'No location set')}</p>
                    <p><i class="fas fa-link"></i> ${escapeHtml(profile?.website || 'No website')}</p>
                    <div class="profile-stats">
                        <div class="stat"><div class="stat-value">${postsCount || 0}</div><div class="stat-label">Posts</div></div>
                        <div class="stat"><div class="stat-value">${friendsCount}</div><div class="stat-label">Friends</div></div>
                    </div>
                </div>`;
            
            const { data: myPosts } = await supabase.from('posts').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            const myPostsDiv = document.getElementById('myPostsList');
            if (myPosts && myPosts.length) myPostsDiv.innerHTML = '<h3>📝 My Posts</h3>' + myPosts.map(p => `<div class="post-card"><div class="post-user">👤 ${escapeHtml(p.user_name)}</div><div>${escapeHtml(p.text||'')}</div>${p.image_url?`<img src="${p.image_url}" class="post-image">`:''}${p.video_url?`<video controls src="${p.video_url}"></video>`:''}<div class="post-stats"><span>❤️ ${p.likes||0} likes</span></div></div>`).join('');
            else myPostsDiv.innerHTML = '<h3>📝 My Posts</h3><div class="loading">No posts yet. Create your first post!</div>';
            
            document.getElementById('editDisplayName').value = profile?.display_name || '';
            document.getElementById('editBio').value = profile?.bio || '';
            document.getElementById('editLocation').value = profile?.location || '';
            document.getElementById('editWebsite').value = profile?.website || '';
        }

        document.getElementById('editProfileBtn')?.addEventListener('click', () => { document.getElementById('profileDisplay').style.display='none'; document.getElementById('profileEdit').style.display='block'; });
        document.getElementById('cancelEditBtn')?.addEventListener('click', () => { document.getElementById('profileDisplay').style.display='block'; document.getElementById('profileEdit').style.display='none'; });
        document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
            await supabase.from('user_profiles').update({ display_name: document.getElementById('editDisplayName').value, bio: document.getElementById('editBio').value, location: document.getElementById('editLocation').value, website: document.getElementById('editWebsite').value, updated_at: new Date() }).eq('id', currentUser.id);
            alert('Profile updated!');
            document.getElementById('profileDisplay').style.display='block'; document.getElementById('profileEdit').style.display='none';
            await loadProfile();
        });

        // friends logic (identical to original but polished)
        async function loadFriends() { if (!currentUser) return;
            const { data: friendships } = await supabase.from('friends').select('*').or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`).eq('status', 'accepted');
            const friendIds = friendships?.map(f => f.user_id === currentUser.id ? f.friend_id : f.user_id) || [];
            if(friendIds.length){
                const { data: friends } = await supabase.from('users').select('id, email').in('id', friendIds);
                document.getElementById('friendsList').innerHTML = friends?.map(f => `<div class="friend-card"><i class="fas fa-user-circle"></i> ${escapeHtml(f.email.split('@')[0])}</div>`).join('') || '<div class="loading">No friends yet</div>';
            } else document.getElementById('friendsList').innerHTML = '<div class="loading">No friends yet. Search above!</div>';
            const { data: requests } = await supabase.from('friends').select('*').eq('friend_id', currentUser.id).eq('status', 'pending');
            if(requests?.length){
                const requesterIds = requests.map(r => r.user_id);
                const { data: requesters } = await supabase.from('users').select('id, email').in('id', requesterIds);
                document.getElementById('friendRequests').innerHTML = requesters?.map(r => `<div class="friend-card">👤 ${escapeHtml(r.email.split('@')[0])}<div class="friend-actions"><button class="accept-btn" onclick="acceptFriend('${r.id}')">Accept</button><button class="reject-btn" onclick="rejectFriend('${r.id}')">Reject</button></div></div>`).join('');
            } else document.getElementById('friendRequests').innerHTML = '<div class="loading">No pending requests</div>';
        }
        window.acceptFriend = async (requesterId) => { await supabase.from('friends').update({ status: 'accepted' }).eq('user_id', requesterId).eq('friend_id', currentUser.id); alert('Friend accepted!'); loadFriends(); loadChatFriends(); loadProfile(); };
        window.rejectFriend = async (requesterId) => { await supabase.from('friends').delete().eq('user_id', requesterId).eq('friend_id', currentUser.id); alert('Rejected'); loadFriends(); };
        window.sendFriendRequest = async (friendId) => { await supabase.from('friends').insert({ user_id: currentUser.id, friend_id: friendId, status: 'pending' }); alert('Request sent!'); document.getElementById('searchUsers').value=''; document.getElementById('searchResults').innerHTML=''; };
        
        document.getElementById('searchUsers')?.addEventListener('input', async (e) => {
            const term = e.target.value.toLowerCase();
            if(term.length<2) { document.getElementById('searchResults').innerHTML=''; return; }
            const { data: users } = await supabase.from('users').select('id, email').ilike('email', `%${term}%`).neq('id', currentUser.id).limit(5);
            if(users?.length) document.getElementById('searchResults').innerHTML = users.map(u => `<div class="friend-card">👤 ${escapeHtml(u.email.split('@')[0])}<div class="friend-actions"><button class="add-friend-btn" onclick="sendFriendRequest('${u.id}')">Add Friend</button></div></div>`).join('');
            else document.getElementById('searchResults').innerHTML = '<div class="loading">No users found</div>';
        });

        // chat 
        async function loadChatFriends() { if(!currentUser) return;
            const { data: friendships } = await supabase.from('friends').select('*').or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`).eq('status', 'accepted');
            const friendIds = friendships?.map(f => f.user_id === currentUser.id ? f.friend_id : f.user_id) || [];
            if(!friendIds.length){ document.getElementById('chatFriendsList').innerHTML='<div class="loading">👥 Add friends first to start chatting!</div>'; return; }
            const { data: friends } = await supabase.from('users').select('id, email').in('id', friendIds);
            document.getElementById('chatFriendsList').innerHTML = '<h3><i class="fas fa-comments"></i> Select a friend:</h3>' + friends?.map(f => `<div class="friend-card chat-friend-item" onclick="selectChatFriend('${f.id}', '${escapeHtml(f.email.split('@')[0])}')"><i class="fas fa-user"></i> ${escapeHtml(f.email.split('@')[0])}</div>`).join('');
        }
        window.selectChatFriend = async (friendId, friendName) => {
            selectedChatFriend = { id: friendId, name: friendName };
            document.querySelectorAll('.chat-friend-item').forEach(el => el.classList.remove('selected-chat'));
            const selected = Array.from(document.querySelectorAll('.chat-friend-item')).find(el => el.getAttribute('onclick')?.includes(friendId));
            if(selected) selected.classList.add('selected-chat');
            document.getElementById('chatInput').disabled=false; document.getElementById('sendChatBtn').disabled=false;
            document.getElementById('chatInput').placeholder = `Message @${friendName}...`;
            const chatDiv = document.getElementById('chatMessages'); chatDiv.innerHTML = '<div class="loading">💬 Loading messages...</div>';
            const { data: messages } = await supabase.from('private_messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`).order('created_at', { ascending: true });
            if(!messages?.length) { chatDiv.innerHTML = '<div class="loading">💬 No messages yet. Say hi!</div>'; return; }
            let html='';
            for(const msg of messages){
                const isMe = msg.sender_id === currentUser.id;
                html += `<div class="message-bubble" style="text-align:${isMe?'right':'left'}; background:${isMe?'rgba(255, 45, 110, 0.2)':'rgba(28,28,40,0.8)'}; border-left:${!isMe?'3px solid #FF8A2B':'none'}"><strong>${isMe?'You':escapeHtml(friendName)}</strong><br>${escapeHtml(msg.text)}</div>`;
            }
            chatDiv.innerHTML = html; chatDiv.scrollTop = chatDiv.scrollHeight;
        };
        async function sendPrivateMessage() {
            if(!currentUser || !selectedChatFriend) { alert('Select a friend first'); return; }
            const input = document.getElementById('chatInput'); const text = input.value.trim();
            if(!text) return;
            await supabase.from('private_messages').insert({ sender_id: currentUser.id, receiver_id: selectedChatFriend.id, text });
            input.value = '';
            selectChatFriend(selectedChatFriend.id, selectedChatFriend.name);
        }
        document.getElementById('sendChatBtn')?.addEventListener('click', sendPrivateMessage);
        document.getElementById('chatInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendPrivateMessage(); });

        // ============ REELS FUNCTION - FIXED! ============
        async function loadReels() {
            const reelsDiv = document.getElementById('videoList');
            if (!reelsDiv) return;
            
            reelsDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading reels...</div>';
            
            // Fetch all posts that have videos
            const { data: videoPosts, error } = await supabase
                .from('posts')
                .select('*')
                .not('video_url', 'is', null)
                .order('created_at', { ascending: false });
            
            if (error) {
                reelsDiv.innerHTML = `<div class="no-reels"><i class="fas fa-exclamation-circle"></i> Error loading reels</div>`;
                return;
            }
            
            if (!videoPosts || videoPosts.length === 0) {
                reelsDiv.innerHTML = `
                    <div class="no-reels">
                        <i class="fas fa-film" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
                        <h3>No Reels Yet</h3>
                        <p>Upload videos in your posts to see them here! 🎬</p>
                    </div>`;
                return;
            }
            
            // Get user's likes for reels
            const { data: userLikes } = currentUser ? await supabase
                .from('post_likes')
                .select('post_id')
                .eq('user_id', currentUser.id) : { data: [] };
            
            const likedPostIds = new Set(userLikes?.map(l => l.post_id) || []);
            
            // Build reels HTML
            let reelsHtml = '';
            for (const post of videoPosts) {
                const isLiked = likedPostIds.has(post.id);
                reelsHtml += `
                    <div class="reel-item" data-post-id="${post.id}">
                        <video 
                            class="reel-video" 
                            src="${post.video_url}" 
                            controls 
                            preload="metadata"
                            playsinline
                            poster="${post.image_url || ''}">
                        </video>
                        <div class="reel-info">
                            <div class="reel-user">
                                <i class="fas fa-user-circle"></i> 
                                <strong>${escapeHtml(post.user_name)}</strong>
                            </div>
                            ${post.text ? `<div class="reel-caption"><i class="fas fa-caption"></i> ${escapeHtml(post.text)}</div>` : ''}
                            <div class="reel-actions">
                                <button class="reel-like-btn ${isLiked ? 'reel-liked' : ''}" onclick="toggleReelLike('${post.id}', ${isLiked})">
                                    <i class="${isLiked ? 'fas fa-heart' : 'far fa-heart'}"></i> 
                                    <span>${post.likes || 0}</span>
                                </button>
                                <button class="reel-comment-btn" onclick="openCommentsOnFeed('${post.id}')">
                                    <i class="far fa-comment"></i> 
                                    <span>Comments</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
            reelsDiv.innerHTML = reelsHtml;
        }
        
        // Toggle like for reels
        window.toggleReelLike = async (postId, isLiked) => {
            if (!currentUser) {
                alert('Please log in to like reels');
                return;
            }
            
            if (isLiked) {
                await supabase.from('post_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
                const { data: p } = await supabase.from('posts').select('likes').eq('id', postId).single();
                await supabase.from('posts').update({ likes: (p?.likes || 0) - 1 }).eq('id', postId);
            } else {
                await supabase.from('post_likes').insert({ post_id: postId, user_id: currentUser.id });
                const { data: p } = await supabase.from('posts').select('likes').eq('id', postId).single();
                await supabase.from('posts').update({ likes: (p?.likes || 0) + 1 }).eq('id', postId);
            }
            loadReels(); // Refresh reels view
            loadFeed();  // Also refresh feed to keep consistent
        };
        
        // Helper to switch to feed and scroll to post comments
        window.openCommentsOnFeed = (postId) => {
            // Switch to feed panel
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const feedBtn = document.querySelector('[data-panel="feed"]');
            if (feedBtn) feedBtn.classList.add('active');
            document.getElementById('feedPanel').classList.add('active');
            
            // Scroll to the post and focus comment input
            setTimeout(() => {
                const commentInput = document.getElementById(`comment-${postId}`);
                if (commentInput) {
                    commentInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    commentInput.focus();
                }
            }, 300);
        };

        // feed + likes/comments identical but improved UI
        async function loadFeed() {
            const feedDiv = document.getElementById('feedList'); feedDiv.innerHTML = '<div class="loading">Loading posts...</div>';
            const { data: posts } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            if(!posts?.length) { feedDiv.innerHTML = '<div class="loading">✨ No posts yet. Be the first! ✨</div>'; return; }
            const { data: userLikes } = currentUser ? await supabase.from('post_likes').select('post_id').eq('user_id', currentUser.id) : { data: [] };
            const likedSet = new Set(userLikes?.map(l=>l.post_id)||[]);
            let html='';
            for(const post of posts){
                const { data: comments } = await supabase.from('comments').select('*').eq('post_id', post.id).order('created_at');
                const isLiked = likedSet.has(post.id);
                html += `<div class="post-card"><div class="post-user"><i class="fas fa-user-astronaut"></i> ${escapeHtml(post.user_name)}</div><div>${escapeHtml(post.text||'')}</div>${post.image_url?`<img src="${post.image_url}" class="post-image">`:''}${post.video_url?`<video controls src="${post.video_url}"></video>`:''}<div class="post-stats"><button class="like-btn ${isLiked?'liked':''}" onclick="toggleLike('${post.id}', ${isLiked})"><i class="${isLiked?'fas fa-heart':'far fa-heart'}"></i> ${post.likes||0}</button><button class="comment-btn" onclick="document.getElementById('comment-${post.id}').focus()"><i class="far fa-comment"></i> ${comments?.length||0}</button></div><div class="comments-section">${comments?.map(c=>`<div class="comment"><strong>${escapeHtml(c.user_name)}</strong>: ${escapeHtml(c.text)}</div>`).join('')}</div><div class="comment-input"><input type="text" placeholder="Add a comment..." id="comment-${post.id}"><button onclick="addComment('${post.id}')">Post</button></div></div>`;
            }
            feedDiv.innerHTML = html;
        }
        window.toggleLike = async (postId, isLiked) => { if(!currentUser) return;
            if(isLiked) { await supabase.from('post_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id); const {data:p}=await supabase.from('posts').select('likes').eq('id',postId).single(); await supabase.from('posts').update({likes: (p?.likes||0)-1}).eq('id',postId); }
            else { await supabase.from('post_likes').insert({ post_id: postId, user_id: currentUser.id }); const {data:p}=await supabase.from('posts').select('likes').eq('id',postId).single(); await supabase.from('posts').update({likes: (p?.likes||0)+1}).eq('id',postId); }
            loadFeed(); loadReels();
        };
        window.addComment = async (postId) => { if(!currentUser) return;
            const input = document.getElementById(`comment-${postId}`); const text = input.value.trim(); if(!text) return;
            await supabase.from('comments').insert({ post_id: postId, user_id: currentUser.id, user_name: currentUser.email.split('@')[0], text });
            input.value = ''; loadFeed(); loadReels();
        };
        document.getElementById('createPostBtn')?.addEventListener('click', async () => { if(!currentUser) return;
            const text = document.getElementById('postText').value.trim();
            const imageFile = document.getElementById('postImage').files[0], videoFile = document.getElementById('postVideo').files[0];
            let imageUrl=null, videoUrl=null;
            if(imageFile) { const fn = `${Date.now()}_${imageFile.name}`; await supabase.storage.from('posts').upload(fn, imageFile); const {data:{publicUrl}} = supabase.storage.from('posts').getPublicUrl(fn); imageUrl=publicUrl; }
            if(videoFile) { const fn = `${Date.now()}_${videoFile.name}`; await supabase.storage.from('posts').upload(fn, videoFile); const {data:{publicUrl}} = supabase.storage.from('posts').getPublicUrl(fn); videoUrl=publicUrl; }
            await supabase.from('posts').insert({ user_id: currentUser.id, user_name: currentUser.email.split('@')[0], text, image_url: imageUrl, video_url: videoUrl, likes:0 });
            document.getElementById('postText').value = ''; document.getElementById('postImage').value=''; document.getElementById('postVideo').value='';
            loadFeed(); loadReels();
        });
        // navigation
        document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
            document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
            const panelId = btn.getAttribute('data-panel'); const panel = document.getElementById(panelId+'Panel'); if(panel) panel.classList.add('active');
            if(panelId==='feed') loadFeed(); 
            if(panelId==='videos') loadReels(); 
            if(panelId==='friends') loadFriends(); 
            if(panelId==='profile') loadProfile(); 
            if(panelId==='chat') loadChatFriends();
        }));
        document.getElementById('logoutBtn')?.addEventListener('click', async () => { await supabase.auth.signOut(); currentUser=null; loginScreen.style.display='flex'; mainApp.style.display='none'; });
        // auth
        document.getElementById('loginBtn')?.addEventListener('click', async () => { const email=document.getElementById('email').value, pwd=document.getElementById('password').value; if(!email||!pwd){ showMessage(loginMessage,'⚠️ Enter email & password','error'); return; } const {data,error}=await supabase.auth.signInWithPassword({email,password}); if(error) showMessage(loginMessage,`❌ ${error.message}`,'error'); else { currentUser=data.user; loginScreen.style.display='none'; mainApp.style.display='flex'; loadProfile(); loadFeed(); loadReels(); } });
        document.getElementById('signupBtn')?.addEventListener('click', async () => { const email=document.getElementById('email').value, pwd=document.getElementById('password').value; if(!email||!pwd){ showMessage(loginMessage,'⚠️ Enter email & password','error'); return; } const {error}=await supabase.auth.signUp({email,password}); if(error) showMessage(loginMessage,`❌ ${error.message}`,'error'); else showMessage(loginMessage,'✅ Account created! Please log in.','success'); document.getElementById('email').value=''; document.getElementById('password').value=''; });
        supabase.auth.onAuthStateChange((_, session) => { if(session){ currentUser=session.user; loginScreen.style.display='none'; mainApp.style.display='flex'; loadProfile(); loadFeed(); loadReels(); } else { currentUser=null; loginScreen.style.display='flex'; mainApp.style.display='none'; } });
    })();
</script>
</body>
</html>
