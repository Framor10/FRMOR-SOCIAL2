<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FRAMOR - Connect Differently</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #FF0066, #FF6600);
            --secondary-gradient: linear-gradient(135deg, #6600CC, #FF0066);
            --accent-gradient: linear-gradient(135deg, #00D4FF, #0099FF);
            --dark-bg: #0A0A0F;
            --card-bg: #1A1A24;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-secondary: #AAA;
            --success-color: #00FF66;
            --error-color: #FF0066;
            --warning-color: #FFCC00;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            color: #FFFFFF;
        }

        /* ============ LOGIN SCREEN ============ */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #0A0A0F 0%, #1A0033 50%, #330066 100%);
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }

        #loginScreen::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 0, 102, 0.1) 0%, transparent 70%);
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        #loginScreen h1 {
            font-size: 4.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            letter-spacing: -2px;
        }

        #loginScreen p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        #loginForm {
            width: 100%;
            max-width: 320px;
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        #loginForm input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        #loginForm input:focus {
            outline: none;
            border-color: #FF0066;
            background: rgba(255, 0, 102, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.2);
        }

        #loginForm input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        #loginForm button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 12px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        #loginForm button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 0, 102, 0.3);
        }

        #loginForm button:active {
            transform: translateY(0);
        }

        #googleBtn {
            background: linear-gradient(135deg, #FFFFFF, #F5F5F5) !important;
            color: #330066 !important;
            border: 2px solid white;
        }

        #googleBtn:hover {
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        /* ============ MAIN APP ============ */
        #mainApp {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: var(--dark-bg);
        }

        .framor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: linear-gradient(135deg, rgba(26, 26, 36, 0.8), rgba(26, 26, 36, 0.4));
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .nav-bar {
            display: flex;
            background: rgba(26, 26, 36, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            gap: 6px;
            border-bottom: 1px solid var(--border-color);
            sticky: top;
            z-index: 9;
        }

        .nav-item {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 8px;
            border-radius: 10px;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item:hover {
            color: #FFFFFF;
            background: rgba(255, 102, 0, 0.1);
        }

        .nav-item.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 0, 102, 0.2);
        }

        .panel {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        .panel.active {
            display: block;
        }

        /* ============ CARDS ============ */
        .post-card, .message-bubble, .friend-card, .profile-card {
            background: linear-gradient(135deg, rgba(26, 26, 36, 0.8), rgba(26, 26, 36, 0.4));
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .post-card:hover, .friend-card:hover {
            border-color: rgba(255, 0, 102, 0.3);
            background: linear-gradient(135deg, rgba(26, 26, 36, 0.95), rgba(26, 26, 36, 0.6));
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .post-user {
            color: #FF6600;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .post-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .like-btn, .comment-btn {
            background: none;
            border: none;
            color: var(--error-color);
            cursor: pointer;
            font-size: 13px;
            padding: 6px 10px;
            transition: all 0.2s ease;
            border-radius: 6px;
        }

        .like-btn:hover, .comment-btn:hover {
            background: rgba(255, 0, 102, 0.1);
            transform: scale(1.1);
        }

        .comment-btn {
            color: var(--warning-color);
        }

        .comments-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .comment {
            padding: 8px 0;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .comment strong {
            color: #FF6600;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .comment-input input {
            flex: 1;
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
        }

        .comment-input input:focus {
            outline: none;
            border-color: #FF0066;
            background: rgba(255, 0, 102, 0.05);
        }

        .comment-input button {
            background: var(--primary-gradient);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .comment-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 0, 102, 0.3);
        }

        /* ============ CHAT ============ */
        .chat-input-container {
            display: flex;
            gap: 10px;
            padding: 14px;
            background: linear-gradient(135deg, rgba(26, 26, 36, 0.9), rgba(26, 26, 36, 0.7));
            border-top: 1px solid var(--border-color);
            border-radius: 20px;
            margin: 12px;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 24px);
            max-width: 476px;
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .chat-input-container input {
            flex: 1;
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 25px;
            color: white;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
        }

        .chat-input-container input:focus {
            outline: none;
            border-color: #FF0066;
            box-shadow: 0 0 15px rgba(255, 0, 102, 0.2);
        }

        .chat-input-container button {
            background: var(--primary-gradient);
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
        }

        .chat-input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 102, 0.3);
        }

        /* ============ CREATE POST ============ */
        .create-post {
            background: linear-gradient(135deg, rgba(26, 26, 36, 0.8), rgba(26, 26, 36, 0.4));
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .create-post textarea, .create-post input {
            width: 100%;
            background: rgba(10, 10, 15, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            color: white;
            margin-bottom: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .create-post textarea:focus, .create-post input:focus {
            outline: none;
            border-color: #FF0066;
            background: rgba(255, 0, 102, 0.05);
            box-shadow: 0 0 15px rgba(255, 0, 102, 0.1);
        }

        .create-post textarea::placeholder, .create-post input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .create-post button {
            background: var(--primary-gradient);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .create-post button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 102, 0.3);
        }

        /* ============ BUTTONS ============ */
        .logout-btn, .edit-profile-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
            font-size: 13px;
        }

        .logout-btn:hover {
            background: rgba(255, 0, 102, 0.2);
            border-color: #FF0066;
        }

        .edit-profile-btn {
            background: var(--primary-gradient);
            border: none;
            margin-top: 16px;
            width: 100%;
        }

        .edit-profile-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 102, 0.3);
        }

        /* ============ MEDIA ============ */
        video, .post-image, .profile-avatar {
            width: 100%;
            border-radius: 12px;
            margin-top: 8px;
        }

        .post-image {
            max-height: 400px;
            object-fit: cover;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 16px;
            display: block;
            border: 4px solid rgba(255, 0, 102, 0.3);
        }

        /* ============ PROFILE ============ */
        .profile-info {
            text-align: center;
        }

        .profile-info h3 {
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 700;
        }

        .profile-info p {
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ============ MESSAGES ============ */
        .message {
            padding: 12px 16px;
            margin: 10px 0;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
        }

        .error {
            background: rgba(255, 0, 102, 0.2);
            color: #FF0066;
            border: 1px solid rgba(255, 0, 102, 0.3);
        }

        .success {
            background: rgba(0, 255, 102, 0.2);
            color: var(--success-color);
            border: 1px solid rgba(0, 255, 102, 0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* ============ INPUTS ============ */
        .search-box, .profile-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(26, 26, 36, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            margin-bottom: 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-box:focus, .profile-input:focus {
            outline: none;
            border-color: #FF0066;
            background: rgba(255, 0, 102, 0.05);
            box-shadow: 0 0 15px rgba(255, 0, 102, 0.1);
        }

        .profile-input {
            margin-bottom: 12px;
        }

        /* ============ FRIEND ACTIONS ============ */
        .friend-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .accept-btn, .reject-btn, .add-friend-btn {
            padding: 6px 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
        }

        .accept-btn {
            background: linear-gradient(135deg, var(--success-color), #00DD55);
            color: #000;
        }

        .accept-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 255, 102, 0.3);
        }

        .reject-btn {
            background: linear-gradient(135deg, var(--error-color), #FF3366);
            color: white;
        }

        .reject-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 0, 102, 0.3);
        }

        .add-friend-btn {
            background: var(--primary-gradient);
            color: white;
        }

        .add-friend-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 0, 102, 0.3);
        }

        h3 {
            margin: 24px 0 12px;
            font-size: 16px;
            font-weight: 700;
            color: #FFFFFF;
        }

        .chat-friend-item {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chat-friend-item:hover {
            background: rgba(255, 102, 0, 0.15);
            border-color: rgba(255, 102, 0, 0.3);
        }

        .selected-chat {
            background: rgba(255, 0, 102, 0.2);
            border: 2px solid #FF0066;
        }

        .liked {
            color: #FF0066;
            opacity: 1;
        }

        /* ============ SCROLLBAR ============ */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 102, 0, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 102, 0, 0.6);
        }
    </style>
</head>
<body>
<div id="loginScreen">
    <h1>FRAMOR</h1>
    <p>Connect differently ✨</p>
    <div id="loginForm">
        <input type="email" id="email" placeholder="📧 Email">
        <input type="password" id="password" placeholder="🔐 Password">
        <button id="signupBtn">Create Account</button>
        <button id="loginBtn">Sign In</button>
        <button id="googleBtn">🚀 Sign in with Google</button>
    </div>
    <div id="loginMessage"></div>
</div>

<div id="mainApp">
    <div class="framor-header">
        <div class="logo">FRAMOR</div>
        <button class="logout-btn" id="logoutBtn">Exit</button>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" data-panel="feed">📱 Feed</button>
        <button class="nav-item" data-panel="videos">🎵 Reels</button>
        <button class="nav-item" data-panel="friends">👥 Friends</button>
        <button class="nav-item" data-panel="profile">👤 Profile</button>
        <button class="nav-item" data-panel="chat">💬 Chat</button>
    </div>

    <div id="feedPanel" class="panel active">
        <div class="create-post">
            <textarea id="postText" placeholder="What's on your mind? 🔥" rows="2"></textarea>
            <input type="file" id="postImage" accept="image/*" placeholder="📸 Image">
            <input type="file" id="postVideo" accept="video/*" placeholder="🎥 Video">
            <button id="createPostBtn">✨ Post to FRAMOR</button>
        </div>
        <div id="feedList"></div>
    </div>

    <div id="videosPanel" class="panel">
        <div id="videoList"></div>
    </div>

    <div id="friendsPanel" class="panel">
        <input type="text" id="searchUsers" class="search-box" placeholder="🔍 Search users to add...">
        <div id="searchResults"></div>
        <h3>👥 My Friends</h3>
        <div id="friendsList"></div>
        <h3>📨 Friend Requests</h3>
        <div id="friendRequests"></div>
    </div>

    <div id="profilePanel" class="panel">
        <div id="profileView">
            <div class="profile-card" id="profileDisplay">
                <div class="profile-info">
                    <div class="profile-stats" id="profileStats"></div>
                    <button class="edit-profile-btn" id="editProfileBtn">✏️ Edit Profile</button>
                </div>
            </div>
        </div>
        <div id="profileEdit" style="display:none;">
            <div class="profile-card">
                <h3>Edit Profile</h3>
                <input type="text" id="editDisplayName" class="profile-input" placeholder="Display Name">
                <textarea id="editBio" class="profile-input" rows="3" placeholder="Bio"></textarea>
                <input type="text" id="editLocation" class="profile-input" placeholder="Location">
                <input type="text" id="editWebsite" class="profile-input" placeholder="Website">
                <button id="saveProfileBtn" class="edit-profile-btn">💾 Save Changes</button>
                <button id="cancelEditBtn" class="logout-btn" style="margin-top: 8px; width: 100%;">Cancel</button>
            </div>
        </div>
        <div id="myPostsList"></div>
    </div>

    <div id="chatPanel" class="panel">
        <div id="chatFriendsList"></div>
        <div id="chatMessages" style="max-height: 50vh; overflow-y: auto; margin-top: 16px;"></div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Select a friend to chat..." disabled>
            <button id="sendChatBtn" disabled>Send</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // Supabase configuration
        const SUPABASE_URL = "https://pknztsbadizlcnlzppch.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Qvi0piL5vNk-734kukD5GA_WtC6nSvb";
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Global variables
        let currentUser = null;
        let realtimeChannels = [];
        let selectedChatFriend = null;
        let userProfile = null;
        
        // DOM elements
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const loginMessage = document.getElementById('loginMessage');
        
        // Helper function to show messages
        function showMessage(element, text, type) {
            if (!element) return;
            element.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (element.innerHTML === `<div class="message ${type}">${text}</div>`) {
                    element.innerHTML = '';
                }
            }, 3000);
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ============ PROFILE FUNCTIONS ============
        async function loadProfile() {
            if (!currentUser) return;
            
            // Get or create user profile
            let { data: profile } = await supabase
                .from('user_profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            
            if (!profile) {
                // Create profile if doesn't exist
                const { data: newProfile } = await supabase
                    .from('user_profiles')
                    .insert({
                        id: currentUser.id,
                        display_name: currentUser.email.split('@')[0]
                    })
                    .select()
                    .single();
                profile = newProfile;
            }
            
            userProfile = profile;
            
            // Get user's posts count
            const { count: postsCount } = await supabase
                .from('posts')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', currentUser.id);
            
            // Get friends count
            const { data: friendships } = await supabase
                .from('friends')
                .select('*')
                .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
                .eq('status', 'accepted');
            
            const friendsCount = friendships?.length || 0;
            
            // Display profile
            const displayName = profile?.display_name || currentUser.email.split('@')[0];
            const bio = profile?.bio || 'No bio yet';
            const location = profile?.location || 'No location set';
            const website = profile?.website || 'No website';
            
            document.getElementById('profileDisplay').innerHTML = `
                <div class="profile-info">
                    <h3>${escapeHtml(displayName)}</h3>
                    <p>📧 ${escapeHtml(currentUser.email)}</p>
                    <p>📝 ${escapeHtml(bio)}</p>
                    <p>📍 ${escapeHtml(location)}</p>
                    <p>🔗 ${escapeHtml(website)}</p>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value">${postsCount || 0}</div>
                            <div class="stat-label">Posts</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${friendsCount}</div>
                            <div class="stat-label">Friends</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Load user's own posts
            const { data: myPosts } = await supabase
                .from('posts')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            const myPostsDiv = document.getElementById('myPostsList');
            if (myPosts && myPosts.length > 0) {
                myPostsDiv.innerHTML = '<h3>📝 My Posts</h3>' + myPosts.map(post => `
                    <div class="post-card">
                        <div class="post-user">👤 ${escapeHtml(post.user_name)}</div>
                        <div>${escapeHtml(post.text || '')}</div>
                        ${post.image_url ? `<img src="${post.image_url}" class="post-image">` : ''}
                        ${post.video_url ? `<video controls src="${post.video_url}"></video>` : ''}
                        <div class="post-stats">
                            <span>❤️ ${post.likes || 0} likes</span>
                        </div>
                    </div>
                `).join('');
            } else {
                myPostsDiv.innerHTML = '<h3>📝 My Posts</h3><div class="loading">No posts yet. Create your first post!</div>';
            }
            
            // Set edit form values
            document.getElementById('editDisplayName').value = profile?.display_name || '';
            document.getElementById('editBio').value = profile?.bio || '';
            document.getElementById('editLocation').value = profile?.location || '';
            document.getElementById('editWebsite').value = profile?.website || '';
        }
        
        // Edit profile
        document.getElementById('editProfileBtn')?.addEventListener('click', () => {
            document.getElementById('profileDisplay').style.display = 'none';
            document.getElementById('profileEdit').style.display = 'block';
        });
        
        document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
            document.getElementById('profileDisplay').style.display = 'block';
            document.getElementById('profileEdit').style.display = 'none';
        });
        
        document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
            const displayName = document.getElementById('editDisplayName').value;
            const bio = document.getElementById('editBio').value;
            const location = document.getElementById('editLocation').value;
            const website = document.getElementById('editWebsite').value;
            
            const { error } = await supabase
                .from('user_profiles')
                .update({
                    display_name: displayName,
                    bio: bio,
                    location: location,
                    website: website,
                    updated_at: new Date()
                })
                .eq('id', currentUser.id);
            
            if (error) {
                alert('Error updating profile: ' + error.message);
            } else {
                alert('Profile updated successfully!');
                document.getElementById('profileDisplay').style.display = 'block';
                document.getElementById('profileEdit').style.display = 'none';
                await loadProfile();
            }
        });
        
        // ============ FRIENDS FUNCTIONS ============
        async function loadFriends() {
            if (!currentUser) return;
            
            // Get accepted friends
            const { data: friendships } = await supabase
                .from('friends')
                .select('*')
                .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
                .eq('status', 'accepted');
            
            const friendIds = friendships?.map(f => f.user_id === currentUser.id ? f.friend_id : f.user_id) || [];
            
            if (friendIds.length > 0) {
                const { data: friends } = await supabase
                    .from('users')
                    .select('id, email')
                    .in('id', friendIds);
                
                document.getElementById('friendsList').innerHTML = friends?.map(f => `
                    <div class="friend-card">👤 ${escapeHtml(f.email.split('@')[0])}</div>
                `).join('') || '<div class="loading">No friends yet</div>';
            } else {
                document.getElementById('friendsList').innerHTML = '<div class="loading">No friends yet. Search above!</div>';
            }
            
            // Get pending friend requests
            const { data: requests } = await supabase
                .from('friends')
                .select('*')
                .eq('friend_id', currentUser.id)
                .eq('status', 'pending');
            
            if (requests && requests.length > 0) {
                const requesterIds = requests.map(r => r.user_id);
                const { data: requesters } = await supabase
                    .from('users')
                    .select('id, email')
                    .in('id', requesterIds);
                
                document.getElementById('friendRequests').innerHTML = requesters?.map(r => `
                    <div class="friend-card">
                        👤 ${escapeHtml(r.email.split('@')[0])}
                        <div class="friend-actions">
                            <button class="accept-btn" onclick="acceptFriend('${r.id}')">Accept</button>
                            <button class="reject-btn" onclick="rejectFriend('${r.id}')">Reject</button>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('friendRequests').innerHTML = '<div class="loading">No pending requests</div>';
            }
        }
        
        // Accept friend request
        window.acceptFriend = async (requesterId) => {
            const { error } = await supabase
                .from('friends')
                .update({ status: 'accepted' })
                .eq('user_id', requesterId)
                .eq('friend_id', currentUser.id);
            
            if (error) {
                alert('Error accepting friend: ' + error.message);
            } else {
                alert('Friend accepted!');
                await loadFriends();
                await loadChatFriends();
                await loadProfile();
            }
        };
        
        // Reject friend request
        window.rejectFriend = async (requesterId) => {
            const { error } = await supabase
                .from('friends')
                .delete()
                .eq('user_id', requesterId)
                .eq('friend_id', currentUser.id);
            
            if (error) {
                alert('Error rejecting friend: ' + error.message);
            } else {
                alert('Friend request rejected');
                await loadFriends();
            }
        };
        
        // Send friend request
        window.sendFriendRequest = async (friendId) => {
            const { error } = await supabase
                .from('friends')
                .insert({
                    user_id: currentUser.id,
                    friend_id: friendId,
                    status: 'pending'
                });
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Friend request sent!');
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchUsers').value = '';
            }
        };
        
        // Search users
        let searchTimeout;
        document.getElementById('searchUsers')?.addEventListener('input', async (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const searchTerm = e.target.value.toLowerCase();
                if (searchTerm.length < 2) {
                    document.getElementById('searchResults').innerHTML = '';
                    return;
                }
                
                const { data: users, error } = await supabase
                    .from('users')
                    .select('id, email')
                    .ilike('email', `%${searchTerm}%`)
                    .neq('id', currentUser.id)
                    .limit(5);
                
                if (error) {
                    console.error("Search error:", error);
                    document.getElementById('searchResults').innerHTML = '<div class="loading">Error searching</div>';
                    return;
                }
                
                if (users && users.length > 0) {
                    document.getElementById('searchResults').innerHTML = users.map(u => `
                        <div class="friend-card">
                            👤 ${escapeHtml(u.email.split('@')[0])}
                            <div class="friend-actions">
                                <button class="add-friend-btn" onclick="sendFriendRequest('${u.id}')">Add Friend</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('searchResults').innerHTML = '<div class="loading">No users found</div>';
                }
            }, 500);
        });
        
        // ============ PRIVATE CHAT FUNCTIONS ============
        async function loadChatFriends() {
            if (!currentUser) return;
            
            // Get all accepted friends
            const { data: friendships } = await supabase
                .from('friends')
                .select('*')
                .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
                .eq('status', 'accepted');
            
            const friendIds = friendships?.map(f => f.user_id === currentUser.id ? f.friend_id : f.user_id) || [];
            
            if (friendIds.length === 0) {
                document.getElementById('chatFriendsList').innerHTML = '<div class="loading">👥 Add friends first to start chatting!</div>';
                return;
            }
            
            const { data: friends } = await supabase
                .from('users')
                .select('id, email')
                .in('id', friendIds);
            
            document.getElementById('chatFriendsList').innerHTML = '<h3>Select a friend to chat:</h3>' + friends?.map(f => `
                <div class="friend-card chat-friend-item" onclick="selectChatFriend('${f.id}', '${escapeHtml(f.email.split('@')[0])}')">
                    👤 ${escapeHtml(f.email.split('@')[0])}
                </div>
            `).join('');
        }
        
        // Select a friend to chat with
        window.selectChatFriend = async (friendId, friendName) => {
            selectedChatFriend = { id: friendId, name: friendName };
            
            // Highlight selected friend
            document.querySelectorAll('.chat-friend-item').forEach(el => {
                el.classList.remove('selected-chat');
            });
            const selectedEl = Array.from(document.querySelectorAll('.chat-friend-item')).find(el => 
                el.getAttribute('onclick')?.includes(friendId)
            );
            if (selectedEl) selectedEl.classList.add('selected-chat');
            
            // Enable chat input
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendChatBtn').disabled = false;
            document.getElementById('chatInput').placeholder = `Message @${friendName}...`;
            
            // Load private messages
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '<div class="loading">💬 Loading messages...</div>';
            
            const { data: messages, error } = await supabase
                .from('private_messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });
            
            if (error) {
                chatDiv.innerHTML = '<div class="loading">Error loading messages</div>';
                return;
            }
            
            if (!messages || messages.length === 0) {
                chatDiv.innerHTML = '<div class="loading">💬 No messages yet. Say hi!</div>';
                return;
            }
            
            let html = '';
            for (const msg of messages) {
                const isMe = msg.sender_id === currentUser.id;
                html += `
                    <div class="message-bubble" style="text-align: ${isMe ? 'right' : 'left'}; background: ${isMe ? 'rgba(255, 0, 102, 0.15)' : 'rgba(26, 26, 36, 0.8)'}; border-left: ${!isMe ? '4px solid #FF6600' : 'none'}; margin-left: ${isMe ? '30px' : '0'}; margin-right: ${isMe ? '0' : '30px'};">
                        <strong>${isMe ? 'You' : escapeHtml(friendName)}</strong><br>${escapeHtml(msg.text)}
                    </div>
                `;
            }
            chatDiv.innerHTML = html;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        };
        
        // Send private message
        async function sendPrivateMessage() {
            if (!currentUser || !selectedChatFriend) {
                alert('Select a friend to chat with first!');
                return;
            }
            
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            const { error } = await supabase
                .from('private_messages')
                .insert({
                    sender_id: currentUser.id,
                    receiver_id: selectedChatFriend.id,
                    text: text
                });
            
            if (error) {
                alert('Message error: ' + error.message);
            } else {
                input.value = '';
                // Reload messages
                window.selectChatFriend(selectedChatFriend.id, selectedChatFriend.name);
            }
        }
        
        // ============ LOAD FEED WITH COMMENTS AND LIKES ============
        async function loadFeed() {
            const feedDiv = document.getElementById('feedList');
            if (!feedDiv) return;
            
            feedDiv.innerHTML = '<div class="loading">Loading posts...</div>';
            
            const { data: posts, error } = await supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                feedDiv.innerHTML = `<div class="message error">Error: ${error.message}</div>`;
                return;
            }
            
            if (!posts || posts.length === 0) {
                feedDiv.innerHTML = '<div class="loading">✨ No posts yet. Be the first! ✨</div>';
                return;
            }
            
            // Get user's likes to check which posts they already liked
            const { data: userLikes } = currentUser ? await supabase
                .from('post_likes')
                .select('post_id')
                .eq('user_id', currentUser.id) : { data: [] };
            
            const likedPostIds = new Set(userLikes?.map(l => l.post_id) || []);
            
            let html = '';
            for (const post of posts) {
                // Get comments for this post
                const { data: comments } = await supabase
                    .from('comments')
                    .select('*')
                    .eq('post_id', post.id)
                    .order('created_at', { ascending: true });
                
                const isLiked = likedPostIds.has(post.id);
                const commentsHtml = comments?.length > 0 ? `
                    <div class="comments-section">
                        ${comments.map(c => `
                            <div class="comment">
                                <strong>${escapeHtml(c.user_name)}</strong>: ${escapeHtml(c.text)}
                            </div>
                        `).join('')}
                    </div>
                ` : '';
                
                html += `
                    <div class="post-card">
                        <div class="post-user">👤 ${escapeHtml(post.user_name)}</div>
                        <div>${escapeHtml(post.text || '')}</div>
                        ${post.image_url ? `<img src="${post.image_url}" class="post-image">` : ''}
                        ${post.video_url ? `<video controls src="${post.video_url}"></video>` : ''}
                        <div class="post-stats">
                            <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}', ${isLiked})">
                                ${isLiked ? '❤️' : '🤍'} ${post.likes || 0}
                            </button>
                            <button class="comment-btn">💬 ${comments?.length || 0}</button>
                        </div>
                        ${commentsHtml}
                        <div class="comment-input">
                            <input type="text" placeholder="Add a comment..." id="comment-${post.id}">
                            <button onclick="addComment('${post.id}')">Post</button>
                        </div>
                    </div>
                `;
            }
            feedDiv.innerHTML = html;
        }
        
        // Toggle like
        window.toggleLike = async (postId, isLiked) => {
            if (!currentUser) {
                alert('Please log in to like posts');
                return;
            }
            
            if (isLiked) {
                // Unlike
                const { error } = await supabase
                    .from('post_likes')
                    .delete()
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id);
                
                if (!error) {
                    // Update post likes count
                    const { error: updateError } = await supabase
                        .from('posts')
                        .update({ likes: (await supabase.from('posts').select('likes').eq('id', postId))[0].likes - 1 })
                        .eq('id', postId);
                    
                    await loadFeed();
                }
            } else {
                // Like
                const { error } = await supabase
                    .from('post_likes')
                    .insert({ post_id: postId, user_id: currentUser.id });
                
                if (!error) {
                    // Update post likes count
                    const { data: post } = await supabase
                        .from('posts')
                        .select('likes')
                        .eq('id', postId)
                        .single();
                    
                    const { error: updateError } = await supabase
                        .from('posts')
                        .update({ likes: (post?.likes || 0) + 1 })
                        .eq('id', postId);
                    
                    await loadFeed();
                }
            }
        };
        
        // Add comment
        window.addComment = async (postId) => {
            if (!currentUser) {
                alert('Please log in to comment');
                return;
            }
            
            const input = document.getElementById(`comment-${postId}`);
            const text = input.value.trim();
            if (!text) return;
            
            const { error } = await supabase
                .from('comments')
                .insert({
                    post_id: postId,
                    user_id: currentUser.id,
                    user_name: currentUser.email.split('@')[0],
                    text: text
                });
            
            if (error) {
                alert('Error posting comment: ' + error.message);
            } else {
                input.value = '';
                await loadFeed();
            }
        };
        
        // ============ CREATE POST ============
        document.getElementById('createPostBtn')?.addEventListener('click', async () => {
            if (!currentUser) {
                alert('Please log in to create a post');
                return;
            }
            
            const text = document.getElementById('postText').value.trim();
            const imageFile = document.getElementById('postImage').files[0];
            const videoFile = document.getElementById('postVideo').files[0];
            
            if (!text && !imageFile && !videoFile) {
                alert('Please add text or media to your post');
                return;
            }
            
            let imageUrl = null;
            let videoUrl = null;
            
            // Upload image if provided
            if (imageFile) {
                const fileName = `${Date.now()}_${imageFile.name}`;
                const { error: uploadError } = await supabase
                    .storage
                    .from('posts')
                    .upload(fileName, imageFile);
                
                if (!uploadError) {
                    const { data } = await supabase
                        .storage
                        .from('posts')
                        .getPublicUrl(fileName);
                    imageUrl = data.publicUrl;
                }
            }
            
            // Upload video if provided
            if (videoFile) {
                const fileName = `${Date.now()}_${videoFile.name}`;
                const { error: uploadError } = await supabase
                    .storage
                    .from('posts')
                    .upload(fileName, videoFile);
                
                if (!uploadError) {
                    const { data } = await supabase
                        .storage
                        .from('posts')
                        .getPublicUrl(fileName);
                    videoUrl = data.publicUrl;
                }
            }
            
            // Create post
            const { error } = await supabase
                .from('posts')
                .insert({
                    user_id: currentUser.id,
                    user_name: currentUser.email.split('@')[0],
                    text: text,
                    image_url: imageUrl,
                    video_url: videoUrl,
                    likes: 0
                });
            
            if (error) {
                alert('Error creating post: ' + error.message);
            } else {
                document.getElementById('postText').value = '';
                document.getElementById('postImage').value = '';
                document.getElementById('postVideo').value = '';
                showMessage(loginMessage, '✨ Post created successfully!', 'success');
                await loadFeed();
            }
        });
        
        // ============ NAVIGATION ============
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all buttons and panels
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                
                // Add active class to clicked button
                btn.classList.add('active');
                
                // Show corresponding panel
                const panelId = btn.getAttribute('data-panel');
                const panel = document.getElementById(panelId + 'Panel');
                if (panel) {
                    panel.classList.add('active');
                    
                    // Load data for specific panels
                    if (panelId === 'feed') {
                        loadFeed();
                    } else if (panelId === 'friends') {
                        loadFriends();
                    } else if (panelId === 'profile') {
                        loadProfile();
                    } else if (panelId === 'chat') {
                        loadChatFriends();
                    }
                }
            });
        });
        
        // ============ SEND CHAT MESSAGE ============
        document.getElementById('sendChatBtn')?.addEventListener('click', sendPrivateMessage);
        document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendPrivateMessage();
            }
        });
        
        // ============ LOGOUT ============
        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            const { error } = await supabase.auth.signOut();
            if (!error) {
                currentUser = null;
                loginScreen.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        });
        
        // ============ LOGIN / SIGNUP ============
        document.getElementById('loginBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage(loginMessage, '⚠️ Please enter email and password', 'error');
                return;
            }
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                showMessage(loginMessage, `❌ ${error.message}`, 'error');
            } else {
                currentUser = data.user;
                loginScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                await loadProfile();
                await loadFeed();
            }
        });
        
        document.getElementById('signupBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage(loginMessage, '⚠️ Please enter email and password', 'error');
                return;
            }
            
            const { data, error } = await supabase.auth.signUp({ email, password });
            
            if (error) {
                showMessage(loginMessage, `❌ ${error.message}`, 'error');
            } else {
                showMessage(loginMessage, '✅ Account created! Please log in.', 'success');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            }
        });
        
        // ============ CHECK AUTH STATE ============
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                loginScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                loadProfile();
                loadFeed();
            } else {
                currentUser = null;
                loginScreen.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        });
    })();
</script>
</body>
</html>
